# Softglow local / VPS dev stack.
# Copy apps/api/.env.example to apps/api/.env, fill it in, then `docker compose up -d --build`.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-softglow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-softglow}
      POSTGRES_DB: ${POSTGRES_DB:-softglow}
    volumes:
      - softglow_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-softglow} -d $${POSTGRES_DB:-softglow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Only expose locally; in prod, leave commented and reach via the docker network.
    ports:
      - "127.0.0.1:5432:5432"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    depends_on:
      db:
        condition: service_healthy
    # Run pending migrations then start the server.
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  softglow_pg:
